<a
  href="{{ projeto().link || '#' }}"
  target="_blank"
  class="flex flex-col gap-4 items-end hover:bg-[#EE2F4D]/10 w-[550px] p-6 rounded-xl transition-all duration-300 cursor-pointer"
>
  <div class="flex gap-2 items-start">
    <div class="flex gap-4">
      <img [src]="projeto().image" [alt]="projeto().name" class="w-60 h-32" />
      <div class="flex flex-col gap-2">
        <div class="flex items-center justify-between">
          <a href="{{ projeto().link }}" target="_blank" class="text-[16px] font-extrabold">{{
            projeto().name
          }}</a>
          @if (projeto().link) {
          <img src="./link-icon.svg" alt="ir para o link do projeto" class="w-4 h-4" />
          }
        </div>
        <p class="text-sm font-light">{{ projeto().description }}</p>
      </div>
    </div>
</div>
<div class="flex flex-wrap align-middle justify-center gap-2 justify-items-center items-center">
  @for (tecnologia of projeto().technologies; track tecnologia) {
  <app-tecnologia-badge [tecnologia]="tecnologia" />
  }
</div>
</a>

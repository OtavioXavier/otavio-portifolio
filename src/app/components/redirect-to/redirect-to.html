<a
  [href]="url()"
  target="_blank"
  [class]="
    className() +
    'flex items-center justify-center gap-4 opacity-50 hover:opacity-100 hover:bg-[#EE2F4D]/20 px-8 py-4 rounded-lg transition-all duration-300 w-fit'
  "
  >
  <span>
    {{ text() }}
  </span>
  <img src="./navigate-icon.svg" alt="ir para o link" class="w-4 h-4"
/></a>
